services:
  options-dashboard:
    build: .
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    environment:
      HOST: 0.0.0.0
      PORT: ${PORT:-5000}
      FLASK_DEBUG: "0"
      USE_JS_BUNDLE: "1"
    volumes:
      - ./portfolio.db:/app/portfolio.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:' + os.environ.get('PORT', '5000') + '/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
